<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreDeck — Focus Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- Shared theme styles -->
  <link rel="stylesheet" href="style.css" />
  <!-- Timer-specific styles (appended to style.css or kept inline below) -->
  <link rel="stylesheet" href="timer.css" />
</head>
<body class="timer-page">

  <!-- =============================================
       NAVIGATION
       Left: CoreDeck logo → back to index.html
       Right: Tools, Mission (Notes removed)
  ============================================= -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">Core<span>Deck</span></a>
    <ul class="nav-links">
      <li><a href="index.html#features">Tools</a></li>
      <li><a href="index.html#mission">Mission</a></li>
    </ul>
  </nav>

  <!-- =============================================
       BACKGROUND LAYER
       Stars + deep gradient — reused from index.html
       No mountains here; the timer floats in open sky.
  ============================================= -->
  <div class="timer-bg" aria-hidden="true">

    <!-- Star constellation (same HTML pattern as index.html) -->
    <div class="stars-container">
      <span class="star s1"  style="top:6%;  left:8%"></span>
      <span class="star s2"  style="top:3%;  left:22%"></span>
      <span class="star s3"  style="top:11%; left:40%"></span>
      <span class="star s4"  style="top:5%;  left:58%"></span>
      <span class="star s5"  style="top:14%; left:72%"></span>
      <span class="star s6"  style="top:4%;  left:86%"></span>
      <span class="star s7"  style="top:20%; left:6%"></span>
      <span class="star s8"  style="top:16%; left:33%"></span>
      <span class="star s9"  style="top:22%; left:52%"></span>
      <span class="star s10" style="top:9%;  left:94%"></span>
      <span class="star s11" style="top:28%; left:78%"></span>
      <span class="star s12" style="top:35%; left:18%"></span>
      <span class="star s13" style="top:32%; left:65%"></span>
      <span class="star s14" style="top:8%;  left:48%"></span>
      <span class="star s15" style="top:18%; left:50%"></span>
      <span class="star s16" style="top:25%; left:2%"></span>
      <span class="star s17" style="top:40%; left:90%"></span>
      <span class="star s18" style="top:7%;  left:68%"></span>
      <span class="star s19" style="top:30%; left:96%"></span>
      <span class="star s20" style="top:42%; left:12%"></span>

      <!-- Sparse constellation lines in the upper sky -->
      <svg class="constellation-lines" viewBox="0 0 1440 900" preserveAspectRatio="none">
        <line x1="115"  y1="54"   x2="317"  y2="27"  />
        <line x1="317"  y1="27"   x2="576"  y2="99"  />
        <line x1="576"  y1="99"   x2="835"  y2="45"  />
        <line x1="835"  y1="45"   x2="1239" y2="36"  />
        <line x1="86"   y1="180"  x2="475"  y2="144" />
        <line x1="475"  y1="144"  x2="748"  y2="162" />
        <line x1="115"  y1="54"   x2="86"   y2="180" />
        <line x1="576"  y1="99"   x2="475"  y2="144" />
      </svg>
    </div>

    <!-- Soft radial glow behind the timer card -->
    <div class="timer-glow"></div>
  </div>

  <!-- =============================================
       MAIN TIMER LAYOUT
  ============================================= -->
  <main class="timer-main">

    <!-- ── GLASSMORPHISM DECK CARD ───────────────── -->
    <div class="timer-deck" id="timerDeck">

      <!-- ── MODE SWITCHER ──────────────────────── -->
      <!--
        Two plain text buttons. JavaScript adds/removes
        the class 'active-mode' to whichever is selected.
        CSS underlines the active one in Sage Green.
      -->
      <div class="mode-switcher" role="tablist" aria-label="Timer mode">
        <button
          class="mode-btn active-mode"
          id="btnFocus"
          role="tab"
          aria-selected="true"
          onclick="switchMode('focus')"
        >Focus Timer</button>

        <button
          class="mode-btn"
          id="btnStopwatch"
          role="tab"
          aria-selected="false"
          onclick="switchMode('stopwatch')"
        >Stopwatch</button>
      </div>

      <!-- ── SESSION LABEL (changes per mode) ─── -->
      <p class="session-label" id="sessionLabel">FOCUS SESSION</p>

      <!-- ── PROGRESS RING + TIME DISPLAY ─────── -->
      <!--
        The SVG ring is only visible in Focus Timer mode.
        A 'dashoffset' on the stroke is updated by JS to
        show how much of the 25 minutes has elapsed.
        radius = 110  →  circumference = 2π × 110 ≈ 691
      -->
      <div class="display-wrapper">
        <svg class="progress-ring" viewBox="0 0 260 260" aria-hidden="true" id="progressRing">
          <!-- Track (background circle) -->
          <circle class="ring-track"  cx="130" cy="130" r="110" />
          <!-- Progress arc -->
          <circle class="ring-fill"   cx="130" cy="130" r="110"
                  id="ringFill"
                  stroke-dasharray="691"
                  stroke-dashoffset="0" />
        </svg>

        <!-- The big time number -->
        <div class="time-display" id="timeDisplay" aria-live="polite">25:00</div>
      </div>

      <!-- ── POMODORO SESSION COUNTER ─────────── -->
      <div class="session-dots" id="sessionDots" aria-label="Sessions completed">
        <!-- Four dots; filled by JS as sessions complete -->
        <span class="dot" id="dot1"></span>
        <span class="dot" id="dot2"></span>
        <span class="dot" id="dot3"></span>
        <span class="dot" id="dot4"></span>
        <span class="dot-label" id="dotLabel">0 / 4 sessions</span>
      </div>

      <!-- ── CONTROL BUTTONS ───────────────────── -->
      <div class="timer-controls">
        <!-- START — solid Sage Green -->
        <button class="btn btn-primary timer-btn" id="btnStart" onclick="startTimer()">
          Start
        </button>

        <!-- PAUSE — outlined -->
        <button class="btn btn-ghost timer-btn" id="btnPause" onclick="pauseTimer()" disabled>
          Pause
        </button>

        <!-- RESET — outlined -->
        <button class="btn btn-ghost timer-btn" id="btnReset" onclick="resetTimer()">
          Reset
        </button>
      </div>

      <!-- ── SOUND DECK ────────────────────────────
           Three <audio> elements are hidden from view.
           The browser loads them silently; JS calls
           .play() / .pause() on them on demand.
           'loop' makes the track restart automatically
           when it reaches the end (works for MP3 files;
           live radio streams loop naturally on their own).
      ─────────────────────────────────────────────── -->

      <!-- Hidden audio sources -->
      <!--
        ⚠ PLACEHOLDER NOTE:
        SoundHelix links are music samples, not real ambience.
        Swap them for royalty-free ambient MP3s from:
          https://pixabay.com/sound-effects/ (search "rain", "forest")
        The Lofi link is a live radio stream — no file download needed.
      -->
      <audio id="audio-rain"   loop preload="none"
             src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
      <audio id="audio-forest" loop preload="none"
             src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio>
      <audio id="audio-lofi"        preload="none"
             src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>
      <!-- Note: 'loop' is omitted on the stream because it is already continuous -->

      <!-- Sound Deck divider -->
      <div class="sound-divider" aria-hidden="true"></div>

      <!-- Sound Deck container -->
      <div class="sound-deck" role="group" aria-label="Ambient sound controls">

        <!-- Row 1: label + sound buttons -->
        <div class="sound-top-row">
          <span class="sound-deck-label">AMBIENCE</span>

          <div class="sound-btns">

            <!-- Rain button -->
            <button
              class="sound-btn"
              id="snd-rain"
              aria-label="Play rain sounds"
              aria-pressed="false"
              onclick="toggleSound('rain')"
            >
              <!-- Rain cloud SVG icon -->
              <svg class="sound-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M8 20a5 5 0 1 1 .3-9.97A7 7 0 1 1 23 14h1a4 4 0 0 1 0 8H8z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M11 24l-1 3M16 24l-1 3M21 24l-1 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              <span class="sound-btn-label">Rain</span>
            </button>

            <!-- Forest button -->
            <button
              class="sound-btn"
              id="snd-forest"
              aria-label="Play forest sounds"
              aria-pressed="false"
              onclick="toggleSound('forest')"
            >
              <!-- Tree SVG icon -->
              <svg class="sound-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M16 4L6 18h7v6h6v-6h7L16 4z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16 4L8 15h6v4h4v-4h6L16 4z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="sound-btn-label">Forest</span>
            </button>

            <!-- Lofi button -->
            <button
              class="sound-btn"
              id="snd-lofi"
              aria-label="Play lofi music"
              aria-pressed="false"
              onclick="toggleSound('lofi')"
            >
              <!-- Headphones SVG icon -->
              <svg class="sound-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M6 18v-3a10 10 0 0 1 20 0v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <rect x="4"  y="18" width="5" height="7" rx="2" stroke="currentColor" stroke-width="1.6"/>
                <rect x="23" y="18" width="5" height="7" rx="2" stroke="currentColor" stroke-width="1.6"/>
              </svg>
              <span class="sound-btn-label">Lofi</span>
            </button>

          </div><!-- /.sound-btns -->
        </div><!-- /.sound-top-row -->

        <!-- Row 2: volume slider -->
        <div class="sound-volume-row">
          <!-- Speaker icon (low) -->
          <svg class="vol-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 7.5h3l4-3v11l-4-3H3V7.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>

          <!--
            VOLUME SLIDER
            input[type=range] gives a native draggable slider.
            The 'oninput' attribute fires every time the thumb moves,
            calling setVolume() in sound.js which updates all audio
            elements' .volume property (range 0.0 – 1.0).
            We start at 0.6 (60%) as a comfortable default.
          -->
          <input
            type="range"
            class="vol-slider"
            id="volSlider"
            min="0" max="1" step="0.01" value="0.6"
            aria-label="Volume"
            oninput="setVolume(this.value)"
          />

          <!-- Speaker icon (high) -->
          <svg class="vol-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 7.5h3l4-3v11l-4-3H3V7.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <path d="M13 6.5a5 5 0 0 1 0 7M15 4.5a8 8 0 0 1 0 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div><!-- /.sound-volume-row -->

      </div><!-- /.sound-deck -->

    </div><!-- /.timer-deck -->

    <!-- ── ATMOSPHERIC FOOTER TEXT ─────────────── -->
    <p class="timer-footer-quote">
      Deep work in progress. Quiet the noise.
    </p>

  </main>

  <!-- =============================================
       JAVASCRIPT — Timer Logic
       Uses setInterval for both countdown and stopwatch.
  ============================================= -->
  <script src="timer.js"></script>
  <script src="sound.js"></script>

</body>
</html>
